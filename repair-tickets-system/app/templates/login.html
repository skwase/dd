{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-0">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрируйтесь</a></p>
                </div>
                <div class="alert alert-info mt-3 small">
                    <strong>Тестовые аккаунты:</strong><br>
                    <strong>Пользователь:</strong> user / user123<br>
                    <strong>Ответственный:</strong> responsible / resp123<br>
                    <strong>Администратор:</strong> admin / admin123
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
